services:
  # Backend API (Docker — needs Chromium for Puppeteer PDF export)
  - type: web
    name: flacroncv-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    region: oregon
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://flacroncv-web.onrender.com
      - key: ADDITIONAL_ORIGINS
        value: https://www.flacroncv.com,https://flacroncv.com
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: WATSONX_API_KEY
        sync: false
      - key: WATSONX_URL
        sync: false
      - key: WATSONX_PROJECT_ID
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_MONTHLY_PRICE_ID
        sync: false
      - key: STRIPE_PRO_YEARLY_PRICE_ID
        sync: false
      - key: STRIPE_ENTERPRISE_MONTHLY_PRICE_ID
        sync: false
      - key: STRIPE_ENTERPRISE_YEARLY_PRICE_ID
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        sync: false
      - key: BREVO_FROM_NAME
        sync: false
      - key: BREVO_TEMPLATE_WELCOME
        sync: false
      - key: BREVO_TEMPLATE_VERIFICATION
        sync: false
      - key: BREVO_TEMPLATE_PASSWORD_RESET
        sync: false

  # Frontend Web App (Docker — uses Next.js standalone output)
  - type: web
    name: flacroncv-web
    runtime: docker
    dockerfilePath: apps/web/Dockerfile
    dockerContext: .
    region: oregon
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://flacroncv-api.onrender.com/api/v1
      - key: NEXT_PUBLIC_APP_URL
        value: https://flacroncv-web.onrender.com
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
