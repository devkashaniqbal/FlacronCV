connectorId: example
generate:
  javascriptSdk:
    - outputDir: ..\..\src\dataconnect-generated
      package: "@dataconnect/generated"
      packageJsonDir: ..\..
      react: false
      angular: false
    - outputDir: ..\..\packages\tsconfig\src\dataconnect-generated
      package: "@dataconnect/generated"
      packageJsonDir: ..\..\packages\tsconfig
      react: false
      angular: false
    - outputDir: ..\..\packages\shared-types\src\dataconnect-generated
      package: "@dataconnect/generated"
      packageJsonDir: ..\..\packages\shared-types
      react: false
      angular: false
    - outputDir: ..\..\apps\web\src\dataconnect-generated
      package: "@dataconnect/generated"
      packageJsonDir: ..\..\apps\web
      react: true
      angular: false
    - outputDir: ..\..\apps\mobile\src\dataconnect-generated
      package: "@dataconnect/generated"
      packageJsonDir: ..\..\apps\mobile
      react: true
      angular: false
  adminNodeSdk:
    - outputDir: ..\..\apps\api\src\dataconnect-admin-generated
      package: "@dataconnect/admin-generated"
      packageJsonDir: ..\..\apps\api
